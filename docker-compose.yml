version: '3.8'

services:
  # -----------------------------------------------------------------------------
  # API Service (FastAPI)
  # -----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ark-api
    ports:
      - "8000:8000"
    environment:
      # HuggingFace model configuration
      - VISION_MODEL=${VISION_MODEL:-Qwen/Qwen3-VL-8B-Thinking}
      - TEXT_LLM_MODEL=${TEXT_LLM_MODEL:-Qwen/Qwen3-8B}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      - BATCH_SIZE=${BATCH_SIZE:-4}

      # DeepSeek configuration (from .env)
      - DEEPSEEK_MODE=${DEEPSEEK_MODE:-api}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-r1}
      - DEEPSEEK_FALLBACK_TO_LOCAL=${DEEPSEEK_FALLBACK_TO_LOCAL:-true}

      # Agentic Research Kit (ARK) configuration
      - RAG_WORKING_DIR=/app/rag_storage

      # API configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data:ro           # Read-only dataset
      - ./rag_storage:/app/rag_storage # RAG storage
      - ./model_cache:/root/.cache/huggingface  # HuggingFace cache
      - ./logs:/app/logs              # Application logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
